veStick" class="stick"><div class="knob"></div></div><div id="aimStick" class="stick"><div class="knob"></div></div><button id="reloadBtn">RELOAD</button><div id="startOverlay"><div class="modal"><h1>좀비 어썰트 프로토타입</h1><p>탑뷰 쌍스틱 슈터의 핵심 전투 샘플입니다. 몰려오는 좀비를 처치하고 웨이브를 버티십시오.</p><div class="features"><div class="feature">PC: WASD + 마우스</div><div class="feature">모바일: 듀얼 스틱</div><div class="feature">탄창·재장전</div><div class="feature">웨이브·보스</div></div><button id="startBtn" class="primary">작전 시작</button></div></div><div id="gameOverOverlay"><div class="modal"><h1>작전 실패</h1><div class="result" id="resultText"></div><button id="restartBtn" class="primary">다시 시작</button></div></div><script>(()=>{const c=document.getElementById('game'),x=c.getContext('2d'),D=Math.min(devicePixelRatio||1,2),u={hpText:hpText,hpFill:hpFill,ammoText:ammoText,reloadFill:reloadFill,waveText:waveText,scoreText:scoreText,centerMessage:centerMessage,gameOverOverlay:gameOverOverlay,resultText:resultText};let W=innerWidth,H=innerHeight;function Z(){W=innerWidth;H=innerHeight;c.width=W*D;c.height=H*D;c.style.width=W+'px';c.style.height=H+'px';x.setTransform(D,0,0,D,0,0)}addEventListener('resize',Z);Z();const k={},m={x:W/2,y:H/2,down:false},mi={x:0,y:0},ai={x:1,y:0,active:false};addEventListener('keydown',e=>{k[e.key.toLowerCase()]=1;if(e.key.toLowerCase()==='r')R()});addEventListener('keyup',e=>k[e.key.toLowerCase()]=0);c.onmousemove=e=>{m.x=e.clientX;m.y=e.clientY};c.onmousedown=()=>m.down=1;addEventListener('mouseup',()=>m.down=0);function S(el,t,a=false){const n=el.querySelector('.knob');let id=null;const q=38,f=(px,py)=>{const r=el.getBoundingClientRect();let dx=px-(r.left+r.width/2),dy=py-(r.top+r.height/2),l=Math.hypot(dx,dy);if(l>q){dx*=q/l;dy*=q/l}n.style.transform=`translate(${dx}px,${dy}px)`;t.x=dx/q;t.y=dy/q;if(a)t.active=Math.hypot(t.x,t.y)>.2};el.onpointerdown=e=>{id=e.pointerId;el.setPointerCapture(id);f(e.clientX,e.clientY)};el.onpointermove=e=>{if(e.pointerId===id)f(e.clientX,e.clientY)};const
