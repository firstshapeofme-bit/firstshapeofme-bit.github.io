<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><title>Zombie Assault Mobile</title><style>*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#0f1417;color:#fff;font-family:Arial,sans-serif;touch-action:none}canvas{position:fixed;inset:0;width:100vw;height:100vh;background:#11181b}#rotate{position:fixed;inset:0;z-index:100;display:none;place-items:center;background:#090d0f;text-align:center}#rotate b{font-size:23px}#hud{position:fixed;inset:0;pointer-events:none}.panel{background:#091015d9;border:1px solid #ffffff26;border-radius:10px;padding:8px 10px}#status{position:absolute;left:10px;top:8px;width:205px}#wave{position:absolute;right:10px;top:8px;text-align:right;min-width:160px}.line{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px}.bar{height:7px;background:#263036;border-radius:9px;overflow:hidden}.fill{height:100%}#hpFill{background:#ed5c5c;width:100%}#reloadFill{background:#e5c354;width:0}#weaponName{font-weight:900;color:#ffe07b}.stick{position:absolute;width:112px;height:112px;border-radius:50%;border:1px solid #ffffff33;background:#ffffff0f;pointer-events:auto}.knob{position:absolute;width:44px;height:44px;left:34px;top:34px;border-radius:50%;background:#ffffff40}#move{left:16px;bottom:14px}#aim{right:230px;bottom:14px}#controls{position:absolute;right:12px;bottom:12px;display:grid;grid-template-columns:repeat(3,66px);gap:7px;pointer-events:auto}.wb{height:52px;border-radius:9px;border:1px solid #ffffff33;background:#111a20dd;color:#fff;font-weight:800;font-size:11px}.wb.active{border-color:#f1cb55;box-shadow:0 0 0 2px #f1cb5540}#reload{position:absolute;right:15px;bottom:76px;width:66px;height:66px;border-radius:50%;border:1px solid #e7c552;background:#e7c5522e;color:#fff;font-weight:900;pointer-events:auto}#msg{position:absolute;left:50%;top:18%;transform:translate(-50%,-50%);font-size:28px;font-weight:900;opacity:0;text-shadow:0 3px 12px #000}.overlay{position:fixed;inset:0;z-index:50;display:grid;place-items:center;background:radial-gradient(circle,#192125b8,#05080af5)}.card{width:min(88vw,470px);padding:22px;border-radius:16px;background:#11181c;border:1px solid #ffffff21}h1{margin:0 0 8px;font-size:25px}p{color:#aab6bb;line-height:1.5;font-size:14px}.primary{width:100%;padding:13px;border:0;border-radius:10px;background:#e1bd45;font-weight:900}#over{display:none}@media(orientation:portrait){#rotate{display:grid}canvas,#hud,.overlay:not(#rotate){visibility:hidden}}@media(pointer:fine){.stick,#reload,#controls{display:none}}</style></head><body><div id="rotate"><div><div style="font-size:60px">↻</div><b>휴대폰을 가로로 돌려주세요</b><p>가로모드 전용입니다.</p></div></div><canvas id="game"></canvas><div id="hud"><div id="status" class="panel"><div class="line"><span>체력</span><b id="hpText">100</b></div><div class="bar"><div id="hpFill" class="fill"></div></div><div class="line" style="margin-top:7px"><span id="weaponName">권총</span><b id="ammoText">12 / ∞</b></div><div class="bar"><div id="reloadFill" class="fill"></div></div></div><div id="wave" class="panel"><b id="waveText">WAVE 1</b><div id="scoreText" style="font-size:12px;color:#aab6bb;margin-top:4px">점수 0 · 처치 0</div></div><div id="msg"></div><div id="move" class="stick"><div class="knob"></div></div><div id="aim" class="stick"><div class="knob"></div></div><button id="reload">재장전</button><div id="controls"><button class="wb active" data-w="0">권총<br>1</button><button class="wb" data-w="1">SMG<br>2</button><button class="wb" data-w="2">산탄총<br>3</button></div></div><div id="start" class="overlay"><div class="card"><h1>좀비 어썰트 모바일</h1><p>가로화면 전용입니다. 왼쪽 스틱으로 이동하고 오른쪽 스틱으로 조준하면 자동 발사합니다. 오른쪽 아래에서 무기를 바꿀 수 있습니다.</p><button id="startBtn" class="primary">작전 시작</button></div></div><div id="over" class="overlay"><div class="card"><h1>작전 실패</h1><p id="result"></p><button id="restartBtn" class="primary">다시 시작</button></div></div><script>(()=>{const c=game,x=c.getContext('2d'),D=Math.min(devicePixelRatio||1,2);let W=innerWidth,H=innerHeight,last=0,run=false,wv=1,score=0,kills=0,left=0,spawn=0,inter=0,B=[],Z=[],shake=0,wi=0;const K={},M={x:W/2,y:H/2,d:false},MI={x:0,y:0},AI={x:1,y:0,a:false};const guns=[{name:'권총',d:34,r:.28,m:12,res:999,rt:1,s:760,n:1,sp:.02,col:'#f3db77'},{name:'기관단총',d:15,r:.075,m:32,res:192,rt:1.35,s:820,n:1,sp:.075,col:'#84cef5'},{name:'산탄총',d:18,r:.72,m:6,res:48,rt:1.8,s:680,n:7,sp:.34,col:'#ff9f68'}];guns.forEach(g=>g.a=g.m);const P={x:W/2,y:H/2,r:15,hp:100,max:100,spd:235,ang:0,fc:0,rl:0,inv:0};function rs(){W=innerWidth;H=innerHeight;c.width=W*D;c.height=H*D;x.setTransform(D,0,0,D,0,0)}addEventListener('resize',rs);rs();addEventListener('keydown',e=>{K[e.key.toLowerCase()]=1;if(e.key==='1')sw(0);if(e.key==='2')sw(1);if(e.key==='3')sw(2);if(e.key.toLowerCase()==='r')re()});addEventListener('keyup',e=>K[e.key.toLowerCase()]=0);c.onmousemove=e=>{M.x=e.clientX;M.y=e.clientY};c.onmousedown=()=>M.d=1;addEventListener('mouseup',()=>M.d=0);function stick(el,t,a){const n=el.firstElementChild;let id=null,R=34;function u(px,py){const q=el.getBoundingClientRect();let dx=px-q.left-q.width/2,dy=py-q.top-q.height/2,l=Math.hypot(dx,dy);if(l>R){dx*=R/l;dy*=R/l}n.style.transform=`translate(${dx}px,${dy}px)`;t.x=dx/R;t.y=dy/R;if(a)t.a=Math.hypot(t.x,t.y)>.18}el.onpointerdown=e=>{id=e.pointerId;el.setPointerCapture(id);u(e.clientX,e.clientY)};el.onpointermove=e=>{if(e.pointerId===id)u(e.clientX,e.clientY)};function end(e){if(e.pointerId!==id)return;id=null;t.x=t.y=0;if(a)t.a=false;n.style.transform=''}el.onpointerup=end;el.onpointercancel=end}stick(move,MI,0);stick(aim,AI,1);document.querySelectorAll('.wb').forEach(b=>b.onclick=()=>sw(+b.dataset.w));reload.onclick=re;function sw(i){wi=i;P.rl=0;document.querySelectorAll('.wb').forEach((b,n)=>b.classList.toggle('active',n===wi));UI()}function re(){const g=guns[wi];if(!run||P.rl>0||g.a>=g.m||g.res<=0)return;P.rl=g.rt}function rel(){const g=guns[wi],n=Math.min(g.m-g.a,g.res);g.a+=n;if(g.res<900)g.res-=n}function say(t){msg.textContent=t;msg.style.opacity=1;clearTimeout(say.t);say.t=setTimeout(()=>msg.style.opacity=0,1000)}function wave(){left=wv%5===0?1:8+wv*3;spawn=0;inter=0;say(wv%5===0?'보스 웨이브 '+wv:'WAVE '+wv)}function reset(){run=1;wv=1;score=kills=0;B=[];Z=[];P.x=W/2;P.y=H/2;P.hp=100;P.rl=0;guns[0].a=12;guns[0].res=999;guns[1].a=32;guns[1].res=192;guns[2].a=6;guns[2].res=48;sw(0);wave()}function addZ(){let s=Math.floor(Math.random()*4),p=35,X,Y;if(s===0){X=-p;Y=Math.random()*H}else if(s===1){X=W+p;Y=Math.random()*H}else if(s===2){X=Math.random()*W;Y=-p}else{X=Math.random()*W;Y=H+p}const boss=wv%5===0,runner=!boss&&Math.random()<.2,tank=!boss&&!runner&&Math.random()<.14;Z.push(boss?{x:X,y:Y,r:34,hp:650+wv*60,max:650+wv*60,s:44,d:24,c:'#8a3f4b',t:'boss',h:0}:tank?{x:X,y:Y,r:23,hp:145+wv*10,max:145+wv*10,s:48,d:16,c:'#747449',t:'tank',h:0}:runner?{x:X,y:Y,r:12,hp:38+wv*3,max:38+wv*3,s:120,d:8,c:'#aa5d45',t:'runner',h:0}:{x:X,y:Y,r:15,hp:58+wv*4,max:58+wv*4,s:68,d:10,c:'#567452',t:'normal',h:0})}function fire(){const g=guns[wi];if(P.rl>0)return;if(g.a<=0){re();return}g.a--;P.fc=g.r;shake=Math.min(8,shake+2);for(let i=0;i<g.n;i++){const a=P.ang+(Math.random()-.5)*g.sp;B.push({x:P.x+Math.cos(a)*22,y:P.y+Math.sin(a)*22,vx:Math.cos(a)*g.s,vy:Math.sin(a)*g.s,l:.75,d:g.d,c:g.col})}}function hurt(z){if(P.inv>0)return;P.hp-=z.d;P.inv=.35;shake=9;if(P.hp<=0){run=0;result.textContent=`도달 웨이브 ${wv} · 처치 ${kills} · 점수 ${score}`;over.style.display='grid'}}function U(dt){if(!run)return;P.fc=Math.max(0,P.fc-dt);P.inv=Math.max(0,P.inv-dt);shake=Math.max(0,shake-dt*26);let dx=(K.d?1:0)-(K.a?1:0)+MI.x,dy=(K.s?1:0)-(K.w?1:0)+MI.y,l=Math.hypot(dx,dy);if(l>1){dx/=l;dy/=l}P.x=Math.max(18,Math.min(W-18,P.x+dx*P.spd*dt));P.y=Math.max(18,Math.min(H-18,P.y+dy*P.spd*dt));P.ang=AI.a?Math.atan2(AI.y,AI.x):Math.atan2(M.y-P.y,M.x-P.x);if((AI.a||M.d)&&P.fc<=0)fire();if(P.rl>0){P.rl-=dt;if(P.rl<=0){P.rl=0;rel()}}if(left>0){spawn-=dt;if(spawn<=0){addZ();left--;spawn=wv%5===0?99:Math.max(.22,.7-wv*.015)}}else if(Z.length===0){if(inter<=0){inter=2;say('구역 확보')}else{inter-=dt;if(inter<=0){wv++;wave()}}}for(let i=B.length-1;i>=0;i--){const b=B[i];b.x+=b.vx*dt;b.y+=b.vy*dt;b.l-=dt;let rm=b.l<=0;if(!rm)for(let j=Z.length-1;j>=0;j--){const z=Z[j];if(Math.hypot(b.x-z.x,b.y-z.y)<z.r+3){z.hp-=b.d;rm=1;if(z.hp<=0){score+=z.t==='boss'?1200:z.t==='tank'?220:z.t==='runner'?130:100;kills++;Z.splice(j,1)}break}}if(rm)B.splice(i,1)}for(const z of Z){const a=Math.atan2(P.y-z.y,P.x-z.x);z.x+=Math.cos(a)*z.s*dt;z.y+=Math.sin(a)*z.s*dt;z.h=Math.max(0,z.h-dt);if(Math.hypot(P.x-z.x,P.y-z.y)<P.r+z.r&&z.h<=0){hurt(z);z.h=.8}}UI()}function UI(){hpText.textContent=Math.max(0,Math.ceil(P.hp));hpFill.style.width=Math.max(0,P.hp/P.max*100)+'%';const g=guns[wi];weaponName.textContent=g.name;ammoText.textContent=g.res>900?`${g.a} / ∞`:`${g.a} / ${g.res}`;reloadFill.style.width=P.rl>0?((1-P.rl/g.rt)*100)+'%':'0%';waveText.textContent='WAVE '+wv;scoreText.textContent=`점수 ${score} · 처치 ${kills}`}function D1(){x.save();if(shake)x.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake);x.fillStyle='#11181b';x.fillRect(0,0,W,H);x.strokeStyle='#ffffff0a';x.beginPath();for(let a=0;a<W;a+=48){x.moveTo(a,0);x.lineTo(a,H)}for(let b=0;b<H;b+=48){x.moveTo(0,b);x.lineTo(W,b)}x.stroke();for(const b of B){x.strokeStyle=b.c;x.lineWidth=3;x.beginPath();x.moveTo(b.x-b.vx*.014,b.y-b.vy*.014);x.lineTo(b.x,b.y);x.stroke()}for(const z of Z){x.fillStyle=z.c;x.beginPath();x.arc(z.x,z.y,z.r,0,Math.PI*2);x.fill();if(z.t==='boss'||z.hp<z.max){x.fillStyle='#222';x.fillRect(z.x-z.r,z.y-z.r-10,z.r*2,4);x.fillStyle='#d95762';x.fillRect(z.x-z.r,z.y-z.r-10,z.r*2*(z.hp/z.max),4)}}if(!(P.inv>0&&Math.floor(P.inv*18)%2===0)){x.save();x.translate(P.x,P.y);x.rotate(P.ang);x.fillStyle='#dfe5e7';x.beginPath();x.arc(0,0,P.r,0,Math.PI*2);x.fill();x.fillStyle=guns[wi].col;x.fillRect(8,-4,28,8);x.restore()}x.restore()}function loop(t){const dt=Math.min(.033,(t-last)/1000||0);last=t;U(dt);D1();requestAnimationFrame(loop)}startBtn.onclick=async()=>{start.style.display='none';try{await document.documentElement.requestFullscreen?.();await screen.orientation?.lock?.('landscape')}catch(e){}reset()};restartBtn.onclick=()=>{over.style.display='none';reset()};requestAnimationFrame(loop)})();</script></body></html>
