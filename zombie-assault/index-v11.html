t"><div class="modal"><h1>작전 준비</h1><p>구매한 강화와 장착 무기가 전투에 적용됩니다.</p><button id="startBtn" class="primary">작전 시작</button></div></div><div id="gameover"><div class="modal"><h1>작전 결과</h1><div id="newRecord">신기록 달성</div><div class="resultGrid"><div class="resultItem"><span>웨이브</span><b id="resultWave">1</b></div><div class="resultItem"><span>처치</span><b id="resultKills">0</b></div><div class="resultItem"><span>점수</span><b id="resultScore">0</b></div><div class="resultItem"><span>무기</span><b id="resultWeapon">권총</b></div><div class="resultItem"><span>보상</span><b id="resultCredits">0</b></div><div class="resultItem"><span>최고</span><b id="resultBest">0</b></div></div><button id="restartBtn" class="primary">재도전</button><button id="homeBtn" class="secondary">홈으로 가기</button></div></div><script>(()=>{const K='outbreakCommandSaveV1';function load(){try{let s=JSON.parse(localStorage.getItem(K)||'{}');return{credits:Number.isFinite(s.credits)?s.credits:1250,selectedLoadout:[0,1,2].includes(s.selectedLoadout)?s.selectedLoadout:0,unlockedWeapons:Array.isArray(s.unlockedWeapons)?s.unlockedWeapons:[0],upgrades:{damage:s.upgrades?.damage||0,reload:s.upgrades?.reload||0,health:s.upgrades?.health||0,speed:s.upgrades?.speed||0,magazine:s.upgrades?.magazine||0},bestWave:s.bestWave||0}}catch(e){return{credits:1250,selectedLoadout:0,unlockedWeapons:[0],upgrades:{damage:0,reload:0,health:0,speed:0,magazine:0},bestWave:0}}}let save=load();const write=()=>localStorage.setItem(K,JSON.stringify(save)),c=game,x=c.getContext('2d'),D=Math.min(devicePixelRatio||1,2);let W=innerWidth,H=innerHeight,last=0,run=false,wv=1,score=0,kills=0,left=0,spawnCd=0,inter=0,B=[],Z=[],shake=0,wi=0;const guns=[{name:'권총',d:34,r:.28,m:12,res:999,rt:1,s:750,n:1,sp:.02,col:'#f3db77'},{name:'기관단총',d:15,r:.075,m:32,res:192,rt:1.35,s:820,n:1,sp:.075,col:'#84cef5'},{name:'산탄총',d:18,r:.72,m:6,res:48,rt:1.8,s:680,n:7,sp:.34,col:'#ff9f68'}],P={x:W/2,y:H/2,r:15,hp:100,max:100,spd:235,ang:0,fc:0,rl:0,inv:0},K1={},M={x:W/2,y:H/2, .y=H/2;P.max=100+save.upgrades.health*10;P.hp=P.max;P.spd=235*(1+save.upgrades.speed*.04);P.fc=P.rl=0;guns.forEach(g=>{g.cap=Math.round(g.m*(1+save.upgrades.magazine*.08));g.a=g.cap});guns[0].res=999;guns[1].res=192;guns[2].res=48;sw(save.selectedLoadout);wave();ui()}function addZ(){let s=Math.floor(Math.random()*4),p=35,X,Y;if(s===0){X=-p;Y=Math.random()*H}else if(s===1){X=W+p;Y=Math.random()*H}else if(s===2){X=Math.random()*W;Y=-p}else{X=Math.random()*W;Y=H+p}let boss=wv%5===0,runner=!boss&&Math.random()<.2,tank=!boss&&!runner&&Math.random()<.14;Z.push(boss?{x:X,y:Y,r:34,hp:650+wv*60,max:650+wv*60,s:44,d:24,c:'#8a3f4b',t:'boss',h:0}:tank?{x:X,y:Y,r:23,hp:145+wv*10,max:145+wv*10,s:48,d:16,c:'#747449',t:'tank',h:0}:runner?{x:X,y:Y,r:12,hp:38+wv*3,max:38+wv*3,s:120,d:8,c:'#aa5d45',t:'runner',h:0}:{x:X,y:Y,r:15,hp:58+wv*4,max:58+wv*4,s:68,d:10,c:'#567452',t:'normal',h:0})}function fire(){let g=guns[wi];if(P.rl>0)return;if(g.a<=0){reload();return}g.a--;P.fc=g.r;shake=Math.min(8,shake+2);for(let i=0;i<g.n;i++){let a=P.ang+(Math.random()-.5)*g.sp;B.push({x:P.x+Math.cos(a)*22,y:P.y+Math.sin(a)*22,vx:Math.cos(a)*g.s,vy:Math.sin(a)*g.s,l:.75,d:g.d*(1+save.upgrades.damage*.05),c:g.col})}}function hurt(z){if(P.inv>0)return;P.hp-=z.d;P.inv=.35;shake=9;if(P.hp<=0){run=false;let reward=Math.max(10,Math.floor(score/10)+wv*5),old=save.bestWave;save.credits+=reward;save.bestWave=Math.max(old,wv);save.selectedLoadout=wi;write();resultWave.textContent=wv;resultKills.textContent=kills;resultScore.textContent=score.toLocaleString();resultWeapon.textContent=guns[wi].name;resultCredits.textContent='+'+reward;resultBest.textContent='WAVE '+save.bestWave;newRecord.style.display=wv>old?'block':'none';gameover.style.display='grid'}}function update(dt){if(!run)return;P.fc=Math.max(0,P.fc-dt);P.inv=Math.max(0,P.inv-dt);shake=Math.max(0,shake-dt*26);let dx=(K1.d?1:0)-(K1.a?1:0)+MI.x,dy=(K1.s?1:0)-(K1.w?1:0)+MI.y,l=Math.hypot(dx,dy);if(l>1){dx/=l;dy/=l}P.x=Math.max(18,Math.min(W-18,P.x+dx*P.spd*dt));P.y=Math.max(18,Math.min(H-18,P.y+dy*P.spd*dt));P.ang=AI.a?Math.atan2(AI.y,AI.x):Math.atan2(M.y-P.y,M.x-P.x);if((AI.a||M.d)&&P.fc<=0)fire();if(P.rl>0){P.rl-=dt;if(P.rl<=0){P.rl=0;rel()}}if(left>0){spawnCd-=dt;if(spawnCd<=0){addZ();left--;spawnCd=wv%5===0?99:Math.max(.22,.7-wv*.015)}}else if(Z.length===0){if(inter<=0){inter=2;say('구역 확보')}else{inter-=dt;if(inter<=0){wv++;wave()}}}for(let i=B.length-1;i>=0;i--){let b=B[i];b.x+=b.vx*dt;b.y+=b.vy*dt;b.l-=dt;let rm=b.l<=0;if(!rm)for(let j=Z.length-1;j>=0;j--){let z=Z[j];if(Math.hypot(b.x-z.x,b.y-z.y)<z.r+3){z.hp-=b.d;rm=true;if(z.hp<=0){score+=z.t==='boss'?1200:z.t==='tank'?220:z.t==='runner'?130:100;kills++;Z.splice(j,1)}break}}if(rm)B.splice(i,1)}for(let z of Z){let a=Math.atan2(P.y-z.y,P.x-z.x);z.x+=Math.cos(a)*z.s*dt;z.y+=Math.sin(a)*z.s*dt;z.h=Math.max(0,z.h-dt);if(Math.hypot(P.x-z.x,P.y-z.y)<P.r+z.r&&z.h<=0){hurt(z);z.h=.8}}ui()}function ui(){hpText.textContent=Math.max(0,Math.ceil(P.hp));hpFill.style.width=Math.max(0,P.hp/P.max*100)+'%';let g=guns[wi];weaponName.textContent=g.name;ammoText.textContent=g.res>900?`${g.a} / ∞`:`${g.a} / ${g.res}`;let rt=g.rt*.96**save.upgrades.reload;reloadFill.style.width=P.rl>0?(1-P.rl/rt)*100+'%':'0%';waveText.textContent='WAVE '+wv;scoreText.textContent=`점수 ${score} · 처치 ${kills}`}function draw(){x.save();if(shake)x.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake);x.fillStyle='#11181b';x.fillRect(0,0,W,H);x.strokeStyle='#ffffff0a';x.beginPath();for(let a=0;a<W;a+=48){x.moveTo(a,0);x.lineTo(a,H)}for(let b=0;b<H;b+=48){x.moveTo(0,b);x.lineTo(W,b)}x.stroke();for(let b of B){x.strokeStyle=b.c;x.lineWidth=3;x.beginPath();x.moveTo(b.x-b.vx*.014,b.y-b.vy*.014);x.lineTo(b.x,b.y);x.stroke()}for(let z of Z){x.fillStyle=z.c;x.beginPath();x.arc(z.x,z.y,z.r,0,Math.PI*2);x.fill();if(z.t==='boss'||z.hp<z.max){x.fillStyle='#222';x.fillRect(z.x-z.r,z.y-z.r-10,z.r*2,4);x.fillStyle='#d95762';x.fillRect(z.x-z.r,z.y-z.r-10,z.r*2*(z.hp/z.max),4)}}if(!(P.inv>0&&Math.floor(P.inv*18)%2==
