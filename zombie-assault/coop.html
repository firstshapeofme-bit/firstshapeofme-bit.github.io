<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><meta name="mobile-web-app-capable" content="yes"><meta name="theme-color" content="#080c0e"><title>Outbreak Command Coop</title><style>*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#0d1215;color:#edf3f5;font-family:Arial,"Noto Sans KR",sans-serif}button,input{font:inherit}.rotate{position:fixed;inset:0;z-index:9;display:none;place-items:center;background:#080c0e;text-align:center}@media(orientation:portrait){.rotate{display:grid}#app{visibility:hidden}}#app{height:100%;display:flex;flex-direction:column}.top{height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;border-bottom:1px solid #ffffff1a;background:#080c0ebd}.brand{font-weight:900}.brand span{color:#e0ba42}.layout{flex:1;min-height:0;display:grid;grid-template-columns:1fr 280px;gap:10px;padding:10px;overflow:hidden}.panel{min-height:0;padding:13px;border:1px solid #ffffff1a;border-radius:13px;background:#11191ddb;overflow-y:auto;touch-action:pan-y}.card{padding:12px;border:1px solid #ffffff1a;border-radius:10px;background:#1b252b;margin-bottom:9px}.actions{display:grid;grid-template-columns:1fr 1fr;gap:9px}.primary,.secondary{width:100%;padding:11px;border-radius:9px;font-weight:900}.primary{border:0;background:linear-gradient(#efcf67,#cfa633);color:#141719}.secondary{border:1px solid #ffffff1a;background:#172026;color:#fff}.code{width:100%;padding:11px;border:1px solid #ffffff1a;border-radius:9px;background:#0e1519;color:#fff;text-transform:uppercase}.room{font-size:24px;letter-spacing:.18em;font-weight:900;color:#ffe07b}.small{font-size:12px;color:#96a6ad}.slots{display:grid;gap:8px}.slot{display:flex;align-items:center;justify-content:space-between;padding:11px;border:1px solid #ffffff1a;border-radius:9px;background:#172026}.slot.empty{opacity:.45}.ready{color:#8be7a3}.wait{color:#ffe07b}.host{font-size:10px;padding:3px 6px;border-radius:999px;background:#e0ba4220;color:#ffe07b}.row{display:flex;justify-content:space-between;align-items:center;gap:8px;margin:9px 0}.back{color:#fff;text-decoration:none;font-size:12px}@media(max-width:760px){.layout{grid-template-columns:1fr 230px}.actions{grid-template-columns:1fr}.top{height:46px}.panel{padding:9px}}</style></head><body><div class="rotate"><div><div style="font-size:56px">↻</div><b>가로로 돌려주세요</b></div></div><div id="app"><header class="top"><div class="brand">OUTBREAK <span>CO-OP</span></div><a class="back" href="./home-v11.html?v=13">← 홈으로</a></header><main class="layout"><section class="panel"><h2>협동 로비</h2><div class="actions"><div class="card"><h3>방 만들기</h3><p class="small">현재 장비와 작전으로 새 방을 만듭니다.</p><button id="createBtn" class="primary">방 만들기</button></div><div class="card"><h3>코드 참가</h3><input id="joinCode" class="code" maxlength="6" placeholder="ABC123"><button id="joinBtn" class="secondary" style="margin-top:8px">참가</button></div></div><div class="card"><div class="small">방 코드</div><div id="roomCode" class="room">------</div><p id="status" class="small">방을 만들거나 참가하십시오.</p></div><div id="slots" class="slots"></div></section><aside class="panel"><h3>로비 설정</h3><div class="card"><p id="mission">작전: 폐쇄 구역</p><p id="weapon">장비: 권총</p></div><div class="row"><span>공개 여부</span><button id="privacyBtn" class="secondary" style="width:auto">비공개</button></div><button id="readyBtn" class="secondary" disabled>준비</button><button id="startBtn" class="primary" style="margin-top:8px" disabled>협동 작전 시작</button><p class="small" style="margin-top:12px">현재는 로비 UI와 상태 흐름 검증 버전입니다. 실제 온라인 동기화는 서버 단계에서 연결됩니다.</p></aside></main></div><script>(()=>{const K='outbreakCommandSaveV1';let s={selectedLoadout:0,selectedMission:0,coop:{privacy:'private'}};try{s={...s,...JSON.parse(localStorage.getItem(K)||'{}')};s.coop={privacy:'private',...(s.coop||{})}}catch(e){}const weapons=['권총','기관단총','산탄총'],missions=['폐쇄 구역','지하 연구소','화물 터미널'];let lobby={active:false,host:false,ready:false,code:'',players:[]};const save=()=>localStorage.setItem(K,JSON.stringify(s));mission.textContent='작전: '+missions[s.selectedMission||0];weapon.textContent='장비: '+weapons[s.selectedLoadout||0];function code(){const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';let r='';for(let i=0;i<6;i++)r+=c[Math.floor(Math.random()*c.length)];return r}function render(){roomCode.textContent=lobby.active?lobby.code:'------';status.textContent=lobby.active?(lobby.host?'방장입니다. 팀원이 준비되면 시작할 수 있습니다.':'방에 참가했습니다. 준비 버튼을 누르십시오.'):'방을 만들거나 참가하십시오.';privacyBtn.textContent=s.coop.privacy==='private'?'비공개':'공개';readyBtn.disabled=!lobby.active;readyBtn.textContent=lobby.ready?'준비 완료':'준비';readyBtn.className=lobby.ready?'primary':'secondary';startBtn.disabled=!(lobby.active&&lobby.host&&lobby.ready);slots.innerHTML='';const arr=[...lobby.players];while(arr.length<4)arr.push(null);arr.forEach((p,i)=>{const d=document.createElement('div');d.className='slot'+(p?'':' empty');d.innerHTML=p?`<div><b>${p.name}</b> ${p.host?'<span class="host">방장</span>':''}<div class="small">${p.weapon}</div></div><b class="${p.ready?'ready':'wait'}">${p.ready?'준비':'대기'}</b>`:`<span>빈 슬롯 ${i+1}</span><span class="small">대기 중</span>`;slots.appendChild(d)})}createBtn.onclick=()=>{lobby={active:true,host:true,ready:false,code:code(),players:[{name:'나',host:true,ready:false,weapon:weapons[s.selectedLoadout||0]}]};s.coop.lastRoom=lobby.code;save();render()};joinBtn.onclick=()=>{const c=joinCode.value.trim().toUpperCase();if(!/^[A-Z0-9]{6}$/.test(c)){status.textContent='6자리 방 코드를 입력하십시오.';return}lobby={active:true,host:false,ready:false,code:c,players:[{name:'방장',host:true,ready:true,weapon:'권총'},{name:'나',host:false,ready:false,weapon:weapons[s.selectedLoadout||0]}]};s.coop.lastRoom=c;save();render()};readyBtn.onclick=()=>{if(!lobby.active)return;lobby.ready=!lobby.ready;const me=lobby.players.find(p=>p.name==='나');if(me)me.ready=lobby.ready;render()};privacyBtn.onclick=()=>{s.coop.privacy=s.coop.privacy==='private'?'public':'private';save();render()};startBtn.onclick=()=>{status.textContent='실제 협동 전투 연결은 다음 네트워크 단계에서 활성화됩니다.'};render()})();</script></body></html>
