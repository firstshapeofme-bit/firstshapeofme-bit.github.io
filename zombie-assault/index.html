utton><button class="weaponBtn" data-w="1">SMG</button><button class="weaponBtn" data-w="2">산탄총</button></div></div><div id="start" class="overlay"><div class="modal"><h1 id="startTitle">작전 준비</h1><p id="startDesc"></p><button id="startBtn" class="primary">작전 시작</button></div></div><div id="gameover" class="overlay"><div class="modal"><h1>작전 결과</h1><div id="record">신기록 달성</div><div class="results"><div class="result"><span>작전</span><b id="rMission"></b></div><div class="result"><span>웨이브</span><b id="rWave"></b></div><div class="result"><span>처치</span><b id="rKills"></b></div><div class="result"><span>점수</span><b id="rScore"></b></div><div class="result"><span>무기</span><b id="rWeapon"></b></div><div class="result"><span>보상</span><b id="rCredits"></b></div></div><button id="restartBtn" class="primary">재도전</button><button id="homeBtn" class="secondary" style="margin-top:8px">홈으로 가기</button></div></div><script>(()=>{const K='outbreakCommandSaveV1',D={credits:1250,selectedLoadout:0,unlockedWeapons:[0],weaponMods:{0:[null,null],1:[null,null],2:[null,null]},upgrades:{damage:0,reload:0,health:0,speed:0,magazine:0},bestWave:0,selectedMission:0,missionBest:{0:0,1:0,2:0}};let s;try{s={...D,...JSON.parse(localStorage.getItem(K)||'')};s.upgrades={...D.upgrades,...(s.upgrades||{})};s.weaponMods={...D.weaponMods,...(s.weaponMods||{})};s.unlockedWeapons=Array.isArray(s.unlockedWeapons)?s.unlockedWeapons:[0];s.missionBest={...D.missionBest,...(s.missionBest||{})}}catch(e){s=structuredClone(D)}const save=()=>localStorage.setItem(K,JSON.stringify(s));const M=[{name:'폐쇄 구역',start:1,hp:1,spd:1,reward:1,bg:'#11181b'},{name:'지하 연구소',start:2,hp:1.3,spd:1.12,reward:1.45,bg:'#142025'},{name:'화물 터미널',start:3,hp:1.65,spd:1.22,reward:2,bg:'#201817'}],mission=M[s.selectedMission]||M[0];const G=[{name:'권총',d:34,rate:.28,mag:12,res:999,reload:1,bs:750,n:1,spread:.02,col:'#f3db77'},{name:'기관단총',d:15,rate:.075,mag:32,res:192,reload:1.35,bs:820,n:1,spread:.075,col:'#84cef5'},{name:'산탄총',d:18,rate:.7 st i=+b.dataset.w;b.style.display=s.unlockedWeapons.includes(i)?'block':'none';b.onclick=()=>setWeapon(i)});reloadBtn.onclick=reload;function setWeapon(i){if(!s.unlockedWeapons.includes(i))return;wi=i;P.rl=0;document.querySelectorAll('.weaponBtn').forEach((b,n)=>b.classList.toggle('active',n===i));ui()}function reload(){const g=G[wi],cap=g.cap||g.mag;if(!run||P.rl>0||g.ammo>=cap||g.res<=0)return;P.rl=reloadTime(g,wi)}function finishReload(){const g=G[wi],cap=g.cap||g.mag,t=Math.min(cap-g.ammo,g.res);g.ammo+=t;if(g.res<900)g.res-=t}function announce(t){msg.textContent=t;msg.style.opacity=1;clearTimeout(announce.t);announce.t=setTimeout(()=>msg.style.opacity=0,1000)}function startWave(){left=wave%5===0?1:8+wave*3;spawnCd=0;announce(wave%5===0?`보스 웨이브 ${wave}`:`WAVE ${wave}`)}function reset(){run=true;wave=mission.start;score=kills=0;B=[];Z=[];inter=0;P.x=W/2;P.y=H/2;P.max=100+s.upgrades.health*10;P.hp=P.max;P.spd=235*(1+s.upgrades.speed*.04);P.fc=P.rl=P.inv=0;G.forEach((g,i)=>{g.cap=mag(g,i);g.ammo=g.cap});G[0].res=999;G[1].res=192;G[2].res=48;setWeapon(s.selectedLoadout);startWave();ui()}function spawn(){let q=Math.floor(Math.random()*4),pad=35,px=q===0?-pad:q===1?W+pad:Math.random()*W,py=q===2?-pad:q===3?H+pad:Math.random()*H,boss=wave%5===0,runner=!boss&&Math.random()<.2,tank=!boss&&!runner&&Math.random()<.14,base=boss?650+wave*60:tank?145+wave*10:runner?38+wave*3:58+wave*4;Z.push({x:px,y:py,r:boss?34:tank?23:runner?12:15,hp:base*mission.hp,max:base*mission.hp,spd:(boss?44:tank?48:runner?120:68)*mission.spd,d:boss?24:tank?16:runner?8:10,col:boss?'#8a3f4b':tank?'#747449':runner?'#aa5d45':'#567452',type:boss?'boss':tank?'tank':runner?'runner':'normal',hit:0})}function fire(){const g=G[wi];if(P.rl>0)return;if(g.ammo<=0){reload();return}g.ammo--;P.fc=rate(g,wi);shake=Math.min(8,shake+2);for(let n=0;n<g.n;n++){const a=P.a+(Math.random()-.5)*g.spread;B.push({x:P.x+Math.cos(a)*22,y:P.y+Math.sin(a)*22,vx:Math.cos(a)*g.bs,vy:Math.sin(a)*g.bs,l:.75,d:damage(g,wi),col:g.col})}}function die(){run=false;const reward=Math.round(Math.max(10,Math.floor(score/10)+wave*5)*mission.reward),old=s.bestWave;s.credits+=reward;s.bestWave=Math.max(s.bestWave,wave);s.missionBest[s.selectedMission]=Math.max(s.missionBest[s.selectedMission]||0,wave);s.selectedLoadout=wi;save();rMission.textContent=mission.name;rWave.textContent='WAVE '+wave;rKills.textContent=kills;rScore.textContent=score.toLocaleString();rWeapon.textContent=G[wi].name;rCredits.textContent='+'+reward.toLocaleString();record.style.display=wave>old?'block':'none';gameover.style.display='grid'}function update(dt){if(!run)return;P.fc=Math.max(0,P.fc-dt);P.inv=Math.max(0,P.inv-dt);shake=Math.max(0,shake-dt*26);let dx=(keys.d?1:0)-(keys.a?1:0)+move.x,dy=(keys.s?1:0)-(keys.w?1:0)+move.y,l=Math.hypot(dx,dy);if(l>1){dx/=l;dy/=l}P.x=Math.max(18,Math.min(W-18,P.x+dx*P.spd*dt));P.y=Math.max(18,Math.min(H-18,P.y+dy*P.spd*dt));P.a=aim.on?Math.atan2(aim.y,aim.x):Math.atan2(mouse.y-P.y,mouse.x-P.x);if((aim.on||mouse.d)&&P.fc<=0)fire();if(P.rl>0&&(P.rl-=dt)<=0){P.rl=0;finishReload()}if(left>0){spawnCd-=dt;if(spawnCd<=0){spawn();left--;spawnCd=wave%5===0?99:Math.max(.22,.7-wave*.015)}}else if(!Z.length){if(inter<=0){inter=2;announce('구역 확보')}else if((inter-=dt)<=0){wave++;startWave()}}for(let i=B.length-1;i>=0;i--){const b=B[i];b.x+=b.vx*dt;b.y+=b.vy*dt;b.l-=dt;let rm=b.l<=0;if(!rm)for(let j=Z.length-1;j>=0;j--){const z=Z[j];if(Math.hypot(b.x-z.x,b.y-z.y)<z.r+3){z.hp-=b.d;rm=true;if(z.hp<=0){score+=z.type==='boss'?1200:z.type==='tank'?220:z.type==='runner'?130:100;kills++;Z.splice(j,1)}break}}if(rm)B.splice(i,1)}for(const z of Z){const a=Math.atan2(P.y-z.y,P.x-z.x);z.x+=Math.cos(a)*z.spd*dt;z.y+=Math.sin(a)*z.spd*dt;z.hit=Math.max(0,z.hit-dt);if(Math.hypot(P.x-z.x,P.y-z.y)<P.r+z.r&&z.hit<=0){if(P.inv<=0){P.hp-=z.d;P.inv=.35;shake=9;if(P.hp<=0)die()}z.hit=.8}}ui()}function ui(){hpText.textContent=Math.max(0,Math.ceil(P.hp));hpFill.style.width=Math.max(0,P.hp/P.max*100)+'%';const g=G[wi];weaponName.textContent=g.name;ammoText.textContent=g.res>900?`${g.ammo} / ∞`:`${g.ammo} / ${g.res}`;const rt=reloadTime(g,wi);reloadFill.style.width=P.rl>0?((1-P.rl/rt)*100)+'%':'0%';waveText.textContent='WAVE '+wave;scoreText.textContent=`점수 ${score} · 처치 ${kills}`}function draw(){x.save();if(shake)x.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake);x.fillStyle=mission.bg;x.fillRect(0,0,W,H);x.strokeStyle='#ffffff0a';x.beginPath();for(let a=0;a<W;a+=48){x.moveTo(a,0);x.lineTo(a,H)}for(let b=0;b<H;b+=48){x.moveTo(0,b);x.lineTo(b,H)}x.stroke();for(const b of B){x.strokeStyle=b.col;x.lineWidth=3;x.beginPath();x.moveTo(b.x-b.vx*.014,b.y-b.vy*.014);x.lineTo(b.x,b.y);x.stroke()}for(const z of Z){x.fillStyle=z.col;x.beginPath();x.arc(z.x,z.y,z.r,0,Math.PI*2);x.fill();if(z.type==='boss'||z.hp<z.max){x.fillStyle='#222';x.fillRect(z.x-z.r,z.y-z.r-10,z.r*2,4);x.fillStyle='#d95762';x.fillRect(z.x-z.r,z.y-z.r-10,z.r*2*z.hp/z.max,4)}}if(!(P.inv>0&&Math.floor(P.inv*18)%2===0)){x.save();x.translate(P.x,P.y);x.rotate(P.a);x.fillStyle='#dfe5e7';x.beginPath();x.arc(0,0,P.r,0,Math.PI*2);x.fill();x.fillStyle=G[wi].col;x.fillRect(8,-4,28,8);x.restore()}x.restore()}function loop(t){const dt=Math.min(.033,(t-last)/1000||0);last=t;update(dt);draw();requestAnimationFrame(loop)}startTitle.textContent=mission.name;startDesc.textContent=`시작 WAVE ${mission.start} · 보상 ×${mission.reward} · 개조 효과 적용`;startBtn.onclick=async()=>{start.style.display='none';try{await document.documentElement.requestFullscreen?.();await screen.orientation?.lock?.('landscape')}catch(e){}reset()};restartBtn.onclick=()=>{gameover.style.display='none';reset()};homeBtn.onclick=()=>{try{document.exitFullscreen?.()}catch(e){}location.href='./home.html?v=14'};requestAnimationFrame(loop)})();</script></body></html>
