<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><title>Zombie Assault Mobile</title><style>*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#0f1417;color:#fff;font-family:Arial,"Noto Sans KR",sans-serif;touch-action:none}canvas{position:fixed;inset:0;width:100vw;height:100vh;background:#11181b}#rotate{position:fixed;inset:0;z-index:100;display:none;place-items:center;background:#090d0f;text-align:center;padding:30px}#rotate .icon{font-size:54px;margin-bottom:16px}#rotate b{font-size:22px}#hud{position:fixed;inset:0;pointer-events:none}.panel{background:rgba(9,13,16,.82);border:1px solid rgba(255,255,255,.15);border-radius:10px;padding:8px 10px;backdrop-filter:blur(5px)}#status{position:absolute;left:max(10px,env(safe-area-inset-left));top:max(8px,env(safe-area-inset-top));width:205px}#wave{position:absolute;right:max(10px,env(safe-area-inset-right));top:max(8px,env(safe-area-inset-top));text-align:right;min-width:165px}.line{display:flex;justify-content:space-between;gap:10px;font-size:12px;margin-bottom:5px}.bar{height:7px;background:#263036;border-radius:9px;overflow:hidden}.fill{height:100%}#hpFill{background:#ed5c5c;width:100%}#reloadFill{background:#e5c354;width:0}#weaponName{font-weight:900;color:#ffe07b}#weaponButtons{position:absolute;right:max(10px,env(safe-area-inset-right));bottom:max(12px,env(safe-area-inset-bottom));display:flex;gap:8px;pointer-events:auto}.weaponBtn{width:68px;height:54px;border-radius:10px;border:1px solid rgba(255,255,255,.2);background:rgba(13,18,21,.82);color:#fff;font-size:11px;font-weight:800}.weaponBtn.active{border-color:#f1cb55;box-shadow:0 0 0 2px rgba(241,203,85,.25)}#reloadBtn{position:absolute;right:max(16px,env(safe-area-inset-right));bottom:82px;width:66px;height:66px;border-radius:50%;border:1px solid #e7c552;background:rgba(231,197,82,.18);color:white;font-weight:900;pointer-events:auto}.stick{position:absolute;width:116px;height:116px;border-radius:50%;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.06);pointer-events:auto}.knob{position:absolute;width:46px;height:46px;left:35px;top:35px;border-radius:50%;background:rgba(255,255,255,.25)}#moveStick{left:max(16px,env(safe-area-inset-left));bottom:max(14px,env(safe-area-inset-bottom))}#aimStick{right:248px;bottom:max(14px,env(safe-area-inset-bottom))}#start,#gameover{position:fixed;inset:0;z-index:50;display:grid;place-items:center;background:radial-gradient(circle,rgba(25,33,37,.7),rgba(5,8,10,.96))}#gameover{display:none}.modal{width:min(88vw,470px);background:#11181c;border:1px solid rgba(255,255,255,.13);border-radius:16px;padding:22px}h1{margin:0 0 8px;font-size:25px}p{color:#aab6bb;line-height:1.5;font-size:14px}.primary{width:100%;padding:13px;border:0;border-radius:10px;background:#e1bd45;font-weight:900}.secondary{width:100%;padding:12px;border:1px solid rgba(255,255,255,.16);border-radius:10px;background:#1a2328;color:#fff;font-weight:900}.resultGrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:14px 0}.resultItem{padding:10px;border:1px solid rgba(255,255,255,.1);border-radius:10px;background:rgba(255,255,255,.04)}.resultItem span{display:block;color:#9eabb1;font-size:11px;margin-bottom:4px}.resultItem b{font-size:16px}#newRecord{display:none;margin:8px 0;padding:7px 10px;border-radius:999px;background:rgba(224,186,66,.14);color:#ffe17b;font-size:12px;font-weight:900;text-align:center}#msg{position:absolute;left:50%;top:20%;transform:translate(-50%,-50%);font-size:28px;font-weight:900;text-shadow:0 3px 12px #000;opacity:0}@media (orientation:portrait){#rotate{display:grid}#start,#gameover,#hud,canvas{visibility:hidden}}@media (pointer:fine){.stick,#reloadBtn,#weaponButtons{display:none}}</style></head><body><div id="rotate"><div><div class="icon">↻</div><b>휴대폰을 가로로 돌려주세요</b><p>이 게임은 가로모드 전용입니다.</p></div></div><canvas id="game"></canvas><div id="hud"><div id="status" class="panel"><div class="line"><span>체력</span><b id="hpText">100</b></div><div class="bar"><div id="hpFill" class="fill"></div></div><div class="line" style="margin-top:7px"><span id="weaponName">권총</span><b id="ammoText">12 / ∞</b></div><div class="bar"><div id="reloadFill" class="fill"></div></div></div><div id="wave" class="panel"><b id="waveText">WAVE 1</b><div id="scoreText" style="font-size:12px;color:#aab6bb;margin-top:4px">점수 0 · 처치 0</div></div><div id="msg"></div><div id="moveStick" class="stick"><div class="knob"></div></div><div id="aimStick" class="stick"><div class="knob"></div></div><button id="reloadBtn">재장전</button><div id="weaponButtons"><button class="weaponBtn active" data-w="0">권총<br>1</button><button class="weaponBtn" data-w="1">SMG<br>2</button><button class="weaponBtn" data-w="2">산탄총<br>3</button></div></div><div id="start"><div class="modal"><h1 id="startMissionName">작전 준비</h1><p id="startMissionDesc">선택한 작전으로 출격합니다.</p><button id="startBtn" class="primary">작전 시작</button></div></div><div id="gameover"><div class="modal"><h1>작전 결과</h1><div id="newRecord">신기록 달성</div><div class="resultGrid"><div class="resultItem"><span>작전</span><b id="resultMission">폐쇄 구역</b></div><div class="resultItem"><span>도달 웨이브</span><b id="resultWave">1</b></div><div class="resultItem"><span>처치 수</span><b id="resultKills">0</b></div><div class="resultItem"><span>점수</span><b id="resultScore">0</b></div><div class="resultItem"><span>사용 무기</span><b id="resultWeapon">권총</b></div><div class="resultItem"><span>획득 크레딧</span><b id="resultCredits">0</b></div><div class="resultItem"><span>최고 웨이브</span><b id="resultBest">0</b></div></div><button id="restartBtn" class="primary">재도전</button><button id="homeBtn" class="secondary" style="margin-top:8px">홈으로 가기</button></div></div><script>(()=>{const SAVE_KEY='outbreakCommandSaveV1';function loadSave(){try{const s=JSON.parse(localStorage.getItem(SAVE_KEY)||'{}');return{credits:Number.isFinite(s.credits)?s.credits:1250,selectedLoadout:[0,1,2].includes(s.selectedLoadout)?s.selectedLoadout:0,upgrades:{damage:Number.isFinite(s?.upgrades?.damage)?s.upgrades.damage:0,reload:Number.isFinite(s?.upgrades?.reload)?s.upgrades.reload:0,health:Number.isFinite(s?.upgrades?.health)?s.upgrades.health:0,speed:Number.isFinite(s?.upgrades?.speed)?s.upgrades.speed:0,magazine:Number.isFinite(s?.upgrades?.magazine)?s.upgrades.magazine:0},unlockedWeapons:Array.isArray(s.unlockedWeapons)?s.unlockedWeapons:[0],selectedMission:[0,1,2].includes(s.selectedMission)?s.selectedMission:0,missionBest:{0:0,1:0,2:0,...(s.missionBest||{})},bestWave:Number.isFinite(s.bestWave)?s.bestWave:0}}catch(e){return{credits:1250,selectedLoadout:0,upgrades:{damage:0,reload:0,health:0,speed:0,magazine:0},unlockedWeapons:[0],selectedMission:0,missionBest:{0:0,1:0,2:0},bestWave:0}}}function writeSave(s){localStorage.setItem(SAVE_KEY,JSON.stringify(s))}let save=loadSave();const missions=[{name:'폐쇄 구역',startWave:1,hp:1,speed:1,reward:1,bg:'#11181b'},{name:'지하 연구소',startWave:2,hp:1.3,speed:1.12,reward:1.45,bg:'#142025'},{name:'화물 터미널',startWave:3,hp:1.65,speed:1.22,reward:2,bg:'#201817'}];const activeMission=missions[save.selectedMission||0];const c=document.getElementById('game'),ctx=c.getContext('2d'),DPR=Math.min(devicePixelRatio||1,2);let W=innerWidth,H=innerHeight,last=0,running=false;function resize(){W=innerWidth;H=innerHeight;c.width=W*DPR;c.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0)}addEventListener('resize',resize);resize();const weapons=[{name:'권총',damage:34,rate:.28,mag:12,reserve:999,reload:1,speed:750,pellets:1,spread:.02,color:'#f3db77'},{name:'기관단총',damage:15,rate:.075,mag:32,reserve:192,reload:1.35,speed:820,pellets:1,spread:.075,color:'#84cef5'},{name:'산탄총',damage:18,rate:.72,mag:6,reserve:48,reload:1.8,speed:680,pellets:7,spread:.34,color:'#ff9f68'}];let wi=0;weapons.forEach(w=>w.ammo=w.mag);const p={x:W/2,y:H/2,r:15,hp:100,maxHp:100,speed:235,angle:0,fireCd:0,reloadLeft:0,inv:0};let bullets=[],zombies=[],wave=1,spawnLeft=0,spawnCd=0,inter=0,score=0,kills=0,shake=0;const keys={},mouse={x:W/2,y:H/2,down:false},move={x:0,y:0},aim={x:1,y:0,active:false};addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=1;if(e.key==='1')setWeapon(0);if(e.key==='2')setWeapon(1);if(e.key==='3')setWeapon(2);if(e.key.toLowerCase()==='r')reload()});addEventListener('keyup',e=>keys[e.key.toLowerCase()]=0);c.onmousemove=e=>{mouse.x=e.clientX;mouse.y=e.clientY};c.onmousedown=()=>mouse.down=true;addEventListener('mouseup',()=>mouse.down=false);function stick(el,target,isAim=false){const knob=el.querySelector('.knob');let id=null,rad=35;function upd(x,y){const r=el.getBoundingClientRect();let dx=x-r.left-r.width/2,dy=y-r.top-r.height/2,l=Math.hypot(dx,dy);if(l>rad){dx*=rad/l;dy*=rad/l}knob.style.transform=`translate(${dx}px,${dy}px)`;target.x=dx/rad;target.y=dy/rad;if(isAim)target.active=Math.hypot(target.x,target.y)>.18}el.onpointerdown=e=>{id=e.pointerId;el.setPointerCapture(id);upd(e.clientX,e.clientY)};el.onpointermove=e=>{if(e.pointerId===id)upd(e.clientX,e.clientY)};const end=e=>{if(e.pointerId!==id)return;id=null;target.x=target.y=0;if(isAim)target.active=false;knob.style.transform='translate(0,0)'};el.onpointerup=end;el.onpointercancel=end}stick(moveStick,move);stick(aimStick,aim,true);document.querySelectorAll('.weaponBtn').forEach(b=>{const i=+b.dataset.w;b.style.display=(save.unlockedWeapons||[0]).includes(i)?'block':'none';b.onclick=()=>setWeapon(i)});reloadBtn.onclick=reload;function setWeapon(i){if(i<0||i>=weapons.length||!(save.unlockedWeapons||[0]).includes(i))return;wi=i;p.reloadLeft=0;document.querySelectorAll('.weaponBtn').forEach((b,n)=>b.classList.toggle('active',n===wi));ui()}function reload(){const w=weapons[wi];if(!running||p.reloadLeft>0||w.ammo>=(w.effectiveMag||w.mag)||w.reserve<=0)return;p.reloadLeft=w.reload*Math.pow(.96,save.upgrades.reload||0)}function finishReload(){const w=weapons[wi],cap=w.effectiveMag||w.mag,take=Math.min(cap-w.ammo,w.reserve);w.ammo+=take;if(w.reserve<900)w.reserve-=take}function announce(t){msg.textContent=t;msg.style.opacity=1;clearTimeout(announce.t);announce.t=setTimeout(()=>msg.style.opacity=0,1100)}function startWave(){spawnLeft=wave%5===0?1:8+wave*3;spawnCd=0;announce(wave%5===0?`보스 웨이브 ${wave}`:`WAVE ${wave}`)}function reset(){running=true;wave=activeMission.startWave;score=kills=0;bullets=[];zombies=[];p.x=W/2;p.y=H/2;p.maxHp=100+(save.upgrades.health||0)*10;p.speed=235*(1+(save.upgrades.speed||0)*.04);p.hp=p.maxHp;p.fireCd=p.reloadLeft=0;weapons.forEach(w=>{w.effectiveMag=Math.max(1,Math.round(w.mag*(1+(save.upgrades.magazine||0)*.08)));w.ammo=w.effectiveMag});weapons[0].reserve=999;weapons[1].reserve=192;weapons[2].reserve=48;setWeapon(save.selectedLoadout||0);startWave();ui()}function spawn(){const s=Math.floor(Math.random()*4),pad=35;let x,y;if(s===0){x=-pad;y=Math.random()*H}else if(s===1){x=W+pad;y=Math.random()*H}else if(s===2){x=Math.random()*W;y=-pad}else{x=Math.random()*W;y=H+pad}const boss=wave%5===0,runner=!boss&&Math.random()<.2,tank=!boss&&!runner&&Math.random()<.14;zombies.push(boss?{x,y,r:34,hp:(650+wave*60)*activeMission.hp,max:(650+wave*60)*activeMission.hp,speed:44*activeMission.speed,damage:24,color:'#8a3f4b',type:'boss',hit:0}:tank?{x,y,r:23,hp:(145+wave*10)*activeMission.hp,max:(145+wave*10)*activeMission.hp,speed:48*activeMission.speed,damage:16,color:'#747449',type:'tank',hit:0}:runner?{x,y,r:12,hp:(38+wave*3)*activeMission.hp,max:(38+wave*3)*activeMission.hp,speed:120*activeMission.speed,damage:8,color:'#aa5d45',type:'runner',hit:0}:{x,y,r:15,hp:(58+wave*4)*activeMission.hp,max:(58+wave*4)*activeMission.hp,speed:68*activeMission.speed,damage:10,color:'#567452',type:'normal',hit:0})}function fire(){const w=weapons[wi];if(p.reloadLeft>0)return;if(w.ammo<=0){reload();return}w.ammo--;p.fireCd=w.rate;shake=Math.min(8,shake+2);for(let n=0;n<w.pellets;n++){const a=p.angle+(Math.random()-.5)*w.spread;bullets.push({x:p.x+Math.cos(a)*22,y:p.y+Math.sin(a)*22,vx:Math.cos(a)*w.speed,vy:Math.sin(a)*w.speed,life:.75,damage:w.damage*(1+(save.upgrades.damage||0)*.05),color:w.color})}}function gameOver(){running=false;const reward=Math.round(Math.max(10,Math.floor(score/10)+wave*5)*activeMission.reward),oldBest=save.bestWave||0;save.credits=(save.credits||1250)+reward;save.bestWave=Math.max(oldBest,wave);save.missionBest[save.selectedMission||0]=Math.max(save.missionBest[save.selectedMission||0]||0,wave);save.selectedLoadout=wi;writeSave(save);resultMission.textContent=activeMission.name;resultWave.textContent=wave;resultKills.textContent=kills;resultScore.textContent=score.toLocaleString();resultWeapon.textContent=weapons[wi].name;resultCredits.textContent='+'+reward.toLocaleString();resultBest.textContent='WAVE '+save.bestWave;newRecord.style.display=wave>oldBest?'block':'none';gameover.style.display='grid'}function update(dt){if(!running)return;p.fireCd=Math.max(0,p.fireCd-dt);p.inv=Math.max(0,p.inv-dt);shake=Math.max(0,shake-dt*26);let dx=(keys.d?1:0)-(keys.a?1:0)+move.x,dy=(keys.s?1:0)-(keys.w?1:0)+move.y,l=Math.hypot(dx,dy);if(l>1){dx/=l;dy/=l}p.x=Math.max(18,Math.min(W-18,p.x+dx*p.speed*dt));p.y=Math.max(18,Math.min(H-18,p.y+dy*p.speed*dt));p.angle=aim.active?Math.atan2(aim.y,aim.x):Math.atan2(mouse.y-p.y,mouse.x-p.x);if((aim.active||mouse.down)&&p.fireCd<=0)fire();if(p.reloadLeft>0){p.reloadLeft-=dt;if(p.reloadLeft<=0){p.reloadLeft=0;finishReload()}}if(spawnLeft>0){spawnCd-=dt;if(spawnCd<=0){spawn();spawnLeft--;spawnCd=wave%5===0?99:Math.max(.22,.7-wave*.015)}}else if(zombies.length===0){if(inter<=0){inter=2;announce('구역 확보')}else{inter-=dt;if(inter<=0){wave++;startWave()}}}for(let i=bullets.length-1;i>=0;i--){const b=bullets[i];b.x+=b.vx*dt;b.y+=b.vy*dt;b.life-=dt;let rm=b.life<=0;if(!rm)for(let j=zombies.length-1;j>=0;j--){const z=zombies[j];if(Math.hypot(b.x-z.x,b.y-z.y)<z.r+3){z.hp-=b.damage;rm=true;if(z.hp<=0){score+=z.type==='boss'?1200:z.type==='tank'?220:z.type==='runner'?130:100;kills++;zombies.splice(j,1)}break}}if(rm)bullets.splice(i,1)}for(const z of zombies){const a=Math.atan2(p.y-z.y,p.x-z.x);z.x+=Math.cos(a)*z.speed*dt;z.y+=Math.sin(a)*z.speed*dt;z.hit=Math.max(0,z.hit-dt);if(Math.hypot(p.x-z.x,p.y-z.y)<p.r+z.r&&z.hit<=0&&p.inv<=0){p.hp-=z.damage;p.inv=.35;z.hit=.8;if(p.hp<=0)gameOver()}}ui()}function ui(){hpText.textContent=Math.max(0,Math.ceil(p.hp));hpFill.style.width=Math.max(0,p.hp/p.maxHp*100)+'%';const w=weapons[wi];weaponName.textContent=w.name;ammoText.textContent=w.reserve>900?`${w.ammo} / ∞`:`${w.ammo} / ${w.reserve}`;const rr=w.reload*Math.pow(.96,save.upgrades.reload||0);reloadFill.style.width=p.reloadLeft>0?(1-p.reloadLeft/rr)*100+'%':'0%';waveText.textContent=`${activeMission.name} · WAVE ${wave}`;scoreText.textContent=`점수 ${score} · 처치 ${kills}`}function draw(){ctx.save();if(shake)ctx.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake);ctx.fillStyle=activeMission.bg;ctx.fillRect(0,0,W,H);ctx.strokeStyle='rgba(255,255,255,.035)';ctx.beginPath();for(let x=0;x<W;x+=48){ctx.moveTo(x,0);ctx.lineTo(x,H)}for(let y=0;y<H;y+=48){ctx.moveTo(0,y);ctx.lineTo(W,y)}ctx.stroke();for(const b of bullets){ctx.strokeStyle=b.color;ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(b.x-b.vx*.014,b.y-b.vy*.014);ctx.lineTo(b.x,b.y);ctx.stroke()}for(const z of zombies){ctx.fillStyle=z.color;ctx.beginPath();ctx.arc(z.x,z.y,z.r,0,Math.PI*2);ctx.fill();if(z.type==='boss'||z.hp<z.max){ctx.fillStyle='#222';ctx.fillRect(z.x-z.r,z.y-z.r-10,z.r*2,4);ctx.fillStyle='#d95762';ctx.fillRect(z.x-z.r,z.y-z.r-10,z.r*2*(z.hp/z.max),4)}}if(!(p.inv>0&&Math.floor(p.inv*18)%2===0)){ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.angle);ctx.fillStyle='#dfe5e7';ctx.beginPath();ctx.arc(0,0,p.r,0,Math.PI*2);ctx.fill();ctx.fillStyle=weapons[wi].color;ctx.fillRect(8,-4,28,8);ctx.restore()}ctx.restore()}function loop(t){const dt=Math.min(.033,(t-last)/1000||0);last=t;update(dt);draw();requestAnimationFrame(loop)}startMissionName.textContent=activeMission.name;startMissionDesc.textContent=`${activeMission.name} · 시작 WAVE ${activeMission.startWave} · 보상 ×${activeMission.reward}`;startBtn.onclick=async()=>{start.style.display='none';try{await document.documentElement.requestFullscreen?.();await screen.orientation?.lock?.('landscape')}catch(e){}reset()};restartBtn.onclick=()=>{gameover.style.display='none';reset()};homeBtn.onclick=()=>{try{document.exitFullscreen?.()}catch(e){}location.href='./home-v11.html?v=12'};requestAnimationFrame(loop)})();</script></body></html>
