<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><meta name="screen-orientation" content="landscape"><title>Zombie Assault Mobile Prototype</title><style>*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#0d1215;color:#eef4f6;font-family:Arial,"Noto Sans KR",sans-serif;touch-action:none}canvas{position:fixed;inset:0;width:100vw;height:100vh;background:#11171a}#hud{position:fixed;inset:0;pointer-events:none}.top{position:absolute;left:max(10px,env(safe-area-inset-left));right:max(10px,env(safe-area-inset-right));top:max(8px,env(safe-area-inset-top));display:flex;justify-content:space-between}.panel{background:rgba(12,17,20,.86);border:1px solid rgba(255,255,255,.13);border-radius:10px;padding:8px 10px}.status{width:190px}.row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}.bar{height:7px;background:rgba(255,255,255,.1);border-radius:9px;overflow:hidden}.fill{height:100%}#hpFill{background:#e35454;width:100%}#reloadFill{background:#e6c34e;width:0}.wave{text-align:right;font-weight:800;font-size:14px}.wave small{display:block;color:#a7b1b5;font-weight:400;margin-top:4px}#msg{position:absolute;left:50%;top:18%;transform:translate(-50%,-50%);font-size:clamp(22px,4vw,42px);font-weight:900;text-shadow:0 4px 15px #000;opacity:0;transition:.2s}.stick{position:fixed;width:112px;height:112px;border-radius:50%;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.06);display:none;pointer-events:auto}.knob{position:absolute;left:34px;top:34px;width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.25)}#move{left:max(18px,env(safe-area-inset-left));bottom:max(14px,env(safe-area-inset-bottom))}#aim{right:max(18px,env(safe-area-inset-right));bottom:max(14px,env(safe-area-inset-bottom))}.action{position:fixed;border-radius:50%;color:white;font-weight:800;display:none;pointer-events:auto;background:rgba(231,197,82,.16);border:1px solid rgba(231,197,82,.6)}#reload{right:max(35px,env(safe-area-inset-right));bottom:132px;width:62px;height:62px;font-size:10px}#swap{right:max(108px,env(safe-area-inset-right));bottom:142px;width:55px;height:55px;font-size:10px}.overlay{position:fixed;inset:0;z-index:20;display:grid;place-items:center;background:radial-gradient(circle,rgba(24,31,35,.78),rgba(5,8,10,.97))}.card{width:min(84vw,560px);max-height:88vh;overflow:auto;padding:20px;border-radius:16px;background:#12191d;border:1px solid rgba(255,255,255,.12)}h1,h2{margin:0 0 8px}p{color:#aab5ba;line-height:1.5;font-size:13px}.btn{width:100%;padding:13px;border:0;border-radius:10px;background:linear-gradient(#f0d46a,#cda633);font-weight:900;color:#181818}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:12px 0}.tile{padding:10px;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.08);border-radius:10px;font-size:12px}.shop{display:none}.shophead{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}.weaponTabs{display:flex;gap:7px;margin-bottom:10px}.weaponTabs button,.upgrade{flex:1;padding:9px;border-radius:9px;border:1px solid rgba(255,255,255,.12);background:#1b252a;color:white}.weaponTabs button.active{border-color:#e6c34e;color:#ffe58d}.upgrades{display:grid;grid-template-columns:1fr 1fr;gap:8px}.upgrade{text-align:left}.upgrade b{display:block;margin-bottom:3px}.upgrade small{color:#9eaaaf}.upgrade:disabled{opacity:.4}#rotate{display:none;z-index:99;text-align:center}.phone{width:60px;height:96px;border:5px solid #e6c34e;border-radius:12px;margin:0 auto 18px;animation:r 1.7s infinite}@keyframes r{0%,25%{transform:rotate(0)}75%,100%{transform:rotate(90deg)}}@media(pointer:coarse){.stick,.action{display:block}}@media(orientation:portrait) and (pointer:coarse){#rotate{display:grid}}</style></head><body><canvas id="game"></canvas><div id="rotate" class="overlay"><div><div class="phone"></div><h1>가로로 돌려주세요</h1><p>모바일 가로 화면 전용입니다.</p></div></div><div id="hud"><div class="top"><div class="panel status"><div class="row"><span>체력</span><b id="hpText">100</b></div><div class="bar"><div id="hpFill" class="fill"></div></div><div class="row" style="margin-top:7px"><span id="weaponText">기관단총</span><b id="ammoText">30 / 180</b></div><div class="bar"><div id="reloadFill" class="fill"></div></div></div><div class="panel wave"><div id="waveText">WAVE 1</div><small id="scoreText">점수 0 · 크레딧 0</small></div></div><div id="msg"></div></div><div id="move" class="stick"><div class="knob"></div></div><div id="aim" class="stick"><div class="knob"></div></div><button id="reload" class="action">RELOAD</button><button id="swap" class="action">WEAPON</button><div id="start" class="overlay"><div class="card"><h1>좀비 어썰트 모바일 샘플</h1><p>가로 화면에서 듀얼 스틱으로 조작합니다. 웨이브 사이에 무기와 성능을 업그레이드할 수 있습니다.</p><div class="grid"><div class="tile">권총·기관단총·산탄총</div><div class="tile">웨이브 보상 크레딧</div><div class="tile">공격력·연사 강화</div><div class="tile">탄창·재장전 강화</div></div><button id="startBtn" class="btn">작전 시작</button></div></div><div id="shop" class="overlay shop"><div class="card"><div class="shophead"><div><h2>보급 및 개조</h2><small id="creditText">크레딧 0</small></div><b id="nextWaveText">다음 WAVE</b></div><div id="weaponTabs" class="weaponTabs"></div><div id="upgrades" class="upgrades"></div><button id="continueBtn" class="btn" style="margin-top:12px">다음 웨이브 시작</button></div></div><div id="over" class="overlay" style="display:none"><div class="card"><h1>작전 실패</h1><p id="result"></p><button id="restartBtn" class="btn">다시 시작</button></div></div><script>(()=>{const c=document.getElementById('game'),ctx=c.getContext('2d'),D=Math.min(devicePixelRatio||1,2);let W=innerWidth,H=innerHeight,last=0,run=false,wave=1,score=0,kills=0,credits=0,spawnLeft=0,spawnT=0,inter=0,bullets=[],zombies=[],shake=0;const keys={},mouse={x:W/2,y:H/2,down:false},mi={x:0,y:0},ai={x:1,y:0,active:false};const weapons=[{name:'권총',color:'#d9dde0',baseDamage:38,baseRate:.28,baseMag:12,baseReload:1.05,reserve:96,pellets:1,spread:.025,bulletSpeed:760,levels:{damage:0,rate:0,mag:0,reload:0}},{name:'기관단총',color:'#e7c552',baseDamage:24,baseRate:.095,baseMag:30,baseReload:1.35,reserve:180,pellets:1,spread:.07,bulletSpeed:700,levels:{damage:0,rate:0,mag:0,reload:0}},{name:'산탄총',color:'#d58a5a',baseDamage:18,baseRate:.58,baseMag:6,baseReload:1.65,reserve:54,pellets:7,spread:.34,bulletSpeed:620,levels:{damage:0,rate:0,mag:0,reload:0}}];let wi=1;const p={x:W/2,y:H/2,r:15,speed:235,hp:100,maxHp:100,ammo:30,fireCd:0,reloadLeft:0,angle:0,inv:0};function ws(){const a=weapons[wi],L=a.levels;return{...a,damage:a.baseDamage*(1+L.damage*.16),rate:a.baseRate*Math.pow(.91,L.rate),mag:a.baseMag+L.mag*(wi===2?1:4),reload:a.baseReload*Math.pow(.9,L.reload)}}function resize(){W=innerWidth;H=innerHeight;c.width=W*D;c.height=H*D;c.style.width=W+'px';c.style.height=H+'px';ctx.setTransform(D,0,0,D,0,0)}addEventListener('resize',resize);resize();addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=1;if(e.key.toLowerCase()==='r')reloadNow();if(e.key===' ')swapWeapon()});addEventListener('keyup',e=>keys[e.key.toLowerCase()]=0);c.onmousemove=e=>{mouse.x=e.clientX;mouse.y=e.clientY};c.onmousedown=()=>mouse.down=true;addEventListener('mouseup',()=>mouse.down=false);function stick(el,t,aiming=false){const n=el.firstElementChild;let id=null,R=34;function set(px,py){const r=el.getBoundingClientRect();let dx=px-r.left-r.width/2,dy=py-r.top-r.height/2,l=Math.hypot(dx,dy);if(l>R){dx*=R/l;dy*=R/l}n.style.transform=`translate(${dx}px,${dy}px)`;t.x=dx/R;t.y=dy/R;if(aiming)t.active=Math.hypot(t.x,t.y)>.2}el.onpointerdown=e=>{id=e.pointerId;el.setPointerCapture(id);set(e.clientX,e.clientY)};el.onpointermove=e=>{if(e.pointerId===id)set(e.clientX,e.clientY)};function end(e){if(e.pointerId!==id)return;id=null;n.style.transform='';t.x=t.y=0;if(aiming)t.active=false}el.onpointerup=end;el.onpointercancel=end}stick(move,mi);stick(aim,ai,true);function fullscreen(){document.documentElement.requestFullscreen?.().catch(()=>{});screen.orientation?.lock?.('landscape').catch(()=>{})}function reset(){wave=1;score=kills=credits=0;bullets=[];zombies=[];p.x=W/2;p.y=H/2;p.hp=100;p.inv=0;wi=1;weapons.forEach(a=>{a.levels={damage:0,rate:0,mag:0,reload:0};a.reserve=a.name==='권총'?96:a.name==='기관단총'?180:54;delete a.savedAmmo});p.ammo=ws().mag;run=true;beginWave();UI()}const msgEl=document.getElementById('msg');function msg(t){msgEl.textContent=t;msgEl.style.opacity=1;clearTimeout(msg.t);msg.t=setTimeout(()=>msgEl.style.opacity=0,1200)}function beginWave(){spawnLeft=wave%5===0?1:7+wave*3;spawnT=0;inter=0;msg(wave%5===0?`보스 웨이브 ${wave}`:`WAVE ${wave}`)}function switchTo(i){weapons[wi].savedAmmo=p.ammo;wi=i;p.ammo=weapons[wi].savedAmmo??ws().mag;p.reloadLeft=0;renderShop();UI()}function swapWeapon(){switchTo((wi+1)%weapons.length)}function reloadNow(){const a=ws();if(!run||p.reloadLeft>0||p.ammo>=a.mag||weapons[wi].reserve<=0)return;p.reloadLeft=a.reload}function shoot(){const a=ws();if(p.reloadLeft>0)return;if(p.ammo<=0){reloadNow();return}p.ammo--;p.fireCd=a.rate;for(let i=0;i<a.pellets;i++){const ang=p.angle+(Math.random()-.5)*a.spread;bullets.push({x:p.x+Math.cos(ang)*24,y:p.y+Math.sin(ang)*24,vx:Math.cos(ang)*a.bulletSpeed,vy:Math.sin(ang)*a.bulletSpeed,life:.82,damage:a.damage})}shake=Math.min(7,shake+2)}function spawn(){let s=Math.floor(Math.random()*4),pad=45,x,y;if(s===0){x=-pad;y=Math.random()*H}else if(s===1){x=W+pad;y=Math.random()*H}else if(s===2){x=Math.random()*W;y=-pad}else{x=Math.random()*W;y=H+pad}const boss=wave%5===0,runner=!boss&&Math.random()<Math.min(.13+wave*.012,.35),tank=!boss&&!runner&&Math.random()<Math.min(.08+wave*.008,.23);zombies.push(boss?{x,y,r:34,hp:520+wave*80,max:520+wave*80,speed:47,damage:24,color:'#823c45',type:'BOSS',hit:0}:tank?{x,y,r:23,hp:130+wave*12,max:130+wave*12,speed:52,damage:15,color:'#6f7041',type:'TANK',hit:0}:runner?{x,y,r:12,hp:34+wave*3,max:34+wave*3,speed:112+wave,damage:8,color:'#ae5b42',type:'RUNNER',hit:0}:{x,y,r:15,hp:55+wave*5,max:55+wave*5,speed:66+wave*.7,damage:10,color:'#55704f',type:'NORMAL',hit:0})}function openShop(){run=false;credits+=120+wave*45;shop.style.display='grid';nextWaveText.textContent=`WAVE ${wave+1}`;renderShop()}function renderShop(){creditText.textContent=`크레딧 ${credits}`;weaponTabs.innerHTML='';weapons.forEach((a,i)=>{let b=document.createElement('button');b.textContent=a.name;b.className=i===wi?'active':'';b.onclick=()=>switchTo(i);weaponTabs.appendChild(b)});upgrades.innerHTML='';const labels={damage:['화력','피해량 +16%'],rate:['작동계','연사 간격 -9%'],mag:['확장 탄창',wi===2?'탄창 +1':'탄창 +4'],reload:['신속 장전','재장전 -10%']};Object.keys(labels).forEach(k=>{const lv=weapons[wi].levels[k],cost=120+lv*110+(wi===2?30:0),b=document.createElement('button');b.className='upgrade';b.disabled=credits<cost||lv>=5;b.innerHTML=`<b>${labels[k][0]} Lv.${lv}</b><small>${labels[k][1]} · ${lv>=5?'MAX':cost+' C'}</small>`;b.onclick=()=>{if(credits>=cost&&lv<5){credits-=cost;weapons[wi].levels[k]++;const a=ws();if(k==='mag')p.ammo=Math.min(a.mag,p.ammo+(wi===2?1:4));renderShop();UI()}};upgrades.appendChild(b)})}function hurt(z){if(p.inv>0)return;p.hp-=z.damage;p.inv=.38;shake=10;if(p.hp<=0){run=false;result.textContent=`웨이브 ${wave} · 처치 ${kills} · 점수 ${score}`;over.style.display='grid'}}function update(dt){if(!run)return;p.fireCd=Math.max(0,p.fireCd-dt);p.inv=Math.max(0,p.inv-dt);shake=Math.max(0,shake-dt*25);let dx=(keys.d?1:0)-(keys.a?1:0)+mi.x,dy=(keys.s?1:0)-(keys.w?1:0)+mi.y,l=Math.hypot(dx,dy);if(l>1){dx/=l;dy/=l}p.x=Math.max(18,Math.min(W-18,p.x+dx*p.speed*dt));p.y=Math.max(18,Math.min(H-18,p.y+dy*p.speed*dt));p.angle=ai.active?Math.atan2(ai.y,ai.x):Math.atan2(mouse.y-p.y,mouse.x-p.x);if((mouse.down||ai.active)&&p.fireCd<=0)shoot();if(p.reloadLeft>0){p.reloadLeft-=dt;if(p.reloadLeft<=0){const a=ws(),n=Math.min(a.mag-p.ammo,weapons[wi].reserve);p.ammo+=n;weapons[wi].reserve-=n;p.reloadLeft=0}}if(spawnLeft>0){spawnT-=dt;if(spawnT<=0){spawn();spawnLeft--;spawnT=wave%5===0?99:Math.max(.2,.7-wave*.018)}}else if(zombies.length===0){inter+=dt;if(inter>.9)openShop()}for(let i=bullets.length-1;i>=0;i--){const b=bullets[i];b.x+=b.vx*dt;b.y+=b.vy*dt;b.life-=dt;let rm=b.life<=0;for(let j=zombies.length-1;!rm&&j>=0;j--){const z=zombies[j];if(Math.hypot(b.x-z.x,b.y-z.y)<z.r+3){z.hp-=b.damage;rm=true;if(z.hp<=0){score+=z.type==='BOSS'?1200:z.type==='TANK'?220:z.type==='RUNNER'?130:100;credits+=z.type==='BOSS'?180:z.type==='TANK'?25:10;kills++;zombies.splice(j,1)}}}if(rm)bullets.splice(i,1)}for(const z of zombies){const a=Math.atan2(p.y-z.y,p.x-z.x);z.x+=Math.cos(a)*z.speed*dt;z.y+=Math.sin(a)*z.speed*dt;z.hit=Math.max(0,z.hit-dt);if(Math.hypot(p.x-z.x,p.y-z.y)<p.r+z.r&&z.hit<=0){hurt(z);z.hit=.8}}UI()}function UI(){const a=ws();hpText.textContent=Math.max(0,Math.ceil(p.hp));hpFill.style.width=Math.max(0,p.hp/p.maxHp*100)+'%';weaponText.textContent=a.name;ammoText.textContent=`${p.ammo} / ${weapons[wi].reserve}`;reloadFill.style.width=p.reloadLeft>0?(1-p.reloadLeft/a.reload)*100+'%':'0%';waveText.textContent=`WAVE ${wave}`;scoreText.textContent=`점수 ${score} · 크레딧 ${credits}`}function draw(){ctx.save();if(shake)ctx.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake);ctx.fillStyle='#11171a';ctx.fillRect(0,0,W,H);ctx.strokeStyle='rgba(255,255,255,.035)';ctx.beginPath();for(let x=0;x<W;x+=48){ctx.moveTo(x,0);ctx.lineTo(x,H)}for(let y=0;y<H;y+=48){ctx.moveTo(0,y);ctx.lineTo(W,y)}ctx.stroke();for(const b of bullets){ctx.strokeStyle='#ffe8a0';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(b.x-b.vx*.014,b.y-b.vy*.014);ctx.lineTo(b.x,b.y);ctx.stroke()}for(const z of zombies){ctx.fillStyle=z.color;ctx.beginPath();ctx.arc(z.x,z.y,z.r,0,Math.PI*2);ctx.fill();if(z.type==='BOSS'||z.hp<z.max){let bw=z.r*2.2;ctx.fillStyle='#221';ctx.fillRect(z.x-bw/2,z.y-z.r-12,bw,5);ctx.fillStyle=z.type==='BOSS'?'#df4f59':'#d6bb52';ctx.fillRect(z.x-bw/2,z.y-z.r-12,bw*z.hp/z.max,5)}}if(!(p.inv>0&&Math.floor(p.inv*18)%2===0)){ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.angle);ctx.fillStyle='#d8dde0';ctx.beginPath();ctx.arc(0,0,p.r,0,Math.PI*2);ctx.fill();ctx.fillStyle=ws().color;ctx.fillRect(7,-4,28,8);ctx.restore()}ctx.restore()}function loop(t){const dt=Math.min(.033,(t-last)/1000||0);last=t;update(dt);draw();requestAnimationFrame(loop)}startBtn.onclick=()=>{fullscreen();start.style.display='none';reset()};restartBtn.onclick=()=>{over.style.display='none';reset()};continueBtn.onclick=()=>{shop.style.display='none';wave++;run=true;beginWave()};reload.onpointerdown=reloadNow;swap.onpointerdown=swapWeapon;requestAnimationFrame(loop)})();</script></body></html>
